# Central configuration for the genome comparison pipeline.
#
# Snakemake loads this automatically because the Snakefile has:
#   configfile: "config/config.yaml"
# Every key below becomes available inside any rule as the global `config` dict,
# e.g. config["output_dir"].

# ---- Input mode ----
# "existing_dir": point at a directory that already contains one protein FASTA and
# one CDS FASTA per genome (named "<genome_id>.fasta", IDs from genome_table below).
# This is the default and always works, regardless of how the files got there --
# whether you copied them from somewhere, or ran the optional JGI download helper
# (workflow/scripts/download_from_jgi.sh) and pointed these paths at its output.
input:
  mode: existing_dir
  protein_dir: "resources/input/proteins"
  cds_dir: "resources/input/cds"

# ---- Input staging (optional) ----
# If your protein_dir/cds_dir aren't already flat "<genome_id>.fasta" files --
# e.g. real Mycocosm downloads, which land nested several directories deep and
# gzipped (sometimes gzipped-tarred) -- point source_dir at the root of that
# download tree and the `stage_inputs` rule will symlink each genome's real
# file into protein_dir/cds_dir as "<genome_id>.fasta.gz" or
# "<genome_id>.fasta.tar.gz" (real extension preserved, no decompression/copy).
# Expected layout under source_dir: <protein_subdir>/<genome_id>/**/*.fasta*
# and <cds_subdir>/<genome_id>/**/*.fasta*, exactly one match per genome per
# category. protein_subdir/cds_subdir default to "proteome_files"/"cds_files"
# (this deployment's convention) -- change them if your download tree names
# those top-level folders differently.
#
# Leave source_dir unset (or delete this whole block) if protein_dir/cds_dir
# already contain flat "<genome_id>.fasta" files -- stage_inputs is skipped
# entirely and qc/parse read directly from protein_dir/cds_dir, as before.
#
# source_dir is user/deployment-specific -- point it at wherever YOUR raw
# downloads live.
staging:
  source_dir: "/clusterfs/jgi/groups/science/homes/ffcisse/enc_analysis"
  protein_subdir: "proteome_files"
  cds_subdir: "cds_files"

# ---- Genome metadata ----
# One row per genome; drives which genome IDs the pipeline processes (via wildcards)
# and how they're labeled in downstream summaries and figures. Beyond genome_id/name,
# the remaining columns are free-form -- use them for whatever grouping matters for
# your dataset (the current example data uses `lifestyle`/`lineage` for a red algae
# study, but nothing about the pipeline assumes those specific column names or values;
# see `sensitivity:` below for where those two particular names get used by default).
genome_table: "config/genomes.tsv"

# ---- Output ----
output_dir: "results"

# ---- Sensitivity analysis (leave-one-subgroup-out) ----
# Phase 4's sensitivity_drop_subgroup/sensitivity_leave_one_out rules test
# whether an apparent effect on `primary_grouping` is actually being driven
# by one value of the finer-grained `subgroup_column` -- both must be column
# names from genome_table above. Defaults match this deployment's use case
# (is the apparent lifestyle effect actually a Galdieria-lineage artifact?),
# but any two columns work, e.g. a "study"/"batch" column instead of lineage
# to check for a batch-confound rather than a phylogenetic one.
sensitivity:
  primary_grouping: lifestyle
  subgroup_column: lineage

# ---- Group value order (optional) ----
# Which value of a grouping column is "A" (vs "B") in effect_sizes'/
# sensitivity_drop_subgroup's cles/rank_biserial columns -- i.e. which
# direction an effect size is signed, and (for a column with >2 values) what
# order its pairwise comparisons are generated in. This is an analyst
# framing choice (which group are you testing FOR), not something
# inferable from the data alone, so it's optional: omit a column entirely,
# or omit this whole block, to get alphabetical order instead. If given, a
# column's list must contain exactly its distinct values in genome_table
# (typos/stale entries after a genome_table edit raise loudly rather than
# silently mis-ordering).
group_value_order:
  lifestyle: [extremophile, mesophile]
  lineage: [Galdieria, Cyanidiales, Mesophile_lineage]

# ---- SLURM submission (optional) ----
# Read by workflow/scripts/submit_phase1.sh, which passes these as `sbatch`
# CLI flags (account/QOS/partition/notification email are cluster- and
# user-specific, so they live here rather than in the .sbatch script itself).
# Not read by Snakemake or any pipeline rule -- only by the submit wrapper.
# Leave partition empty if your cluster doesn't require one (DORI doesn't).
slurm:
  account: "grp-org-sc-fungal"
  qos: "jgi_normal"
  partition: ""
  mail_user: "ffcisse@berkeley.edu"
